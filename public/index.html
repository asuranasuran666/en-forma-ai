<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>En-Forma-AI | Tu Coach</title>
<link rel="manifest" href="/manifest.json">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 50px; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; }
        h2 { color: #1a73e8; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1557b0; }
        #resultado { margin-top: 20px; padding: 10px; border-radius: 5px; display: none; }
        .exito { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🏋️ En-Forma-AI</h2>
        <p>Crea tu cuenta de entrenamiento:</p>
        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="number" id="peso" placeholder="Peso (kg)">
        <input type="number" id="estatura" placeholder="Estatura (cm)">
        <input type="number" id="edad" placeholder="Edad">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="registrar()">REGISTRAR Y VER RUTINA</button>

        <div id="resultado"></div>
    </div>

    <script>
        async function registrar() {
            const datos = {
                nombre: document.getElementById('nombre').value,
                peso: parseInt(document.getElementById('peso').value),
                estatura: parseInt(document.getElementById('estatura').value),
                edad: parseInt(document.getElementById('edad').value),
                password: document.getElementById('pass').value
            };

            const respuesta = await fetch('/registro', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(datos)
            });

            const res = await respuesta.json();
            const div = document.getElementById('resultado');
            div.style.display = 'block';
            div.className = 'exito';
            div.innerHTML = `<b>${res.mensaje}</b><br>Tu plan: ${res.tu_plan}`;
        }
    </script>
</body>
</html>
